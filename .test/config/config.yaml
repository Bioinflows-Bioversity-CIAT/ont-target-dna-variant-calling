base_dir: "/home/scruz/workflows/ont-target-dna-variant-calling"
demultiplexing: TRUE
sequencing_units_path: "config/sequencing_units.txt"
sample_units_path: "config/sample_units.txt"
reference_units_path: "config/reference_units.txt"
interval_units_path: "config/interval_units.txt"

dorado:
  path: /home/scruz/software/dorado-1.0.2-linux-x64/bin/dorado
  barcode_kit: "SQK-NBD114-96"
  device: "cuda:0"
  min-q: 10
  trim: "all"
  model: "/home/scruz/software/dorado-1.0.2-linux-x64/model/dna_r10.4.1_e8.2_400bps_sup@v5.2.0"

seqkit_seq:
  min_read_len: 500
  max_read_len: 1000

GATK:
  interval_length: 1000000
  HaplotypeCaller:
    G: ["StandardAnnotation", "StandardHCAnnotation"]
    kmer-size: [11,17,23,29,35,41]
    min_base-qual: 10
    extra:
      - "--do-not-run-physical-phasing"
  CombineGVCFs:
    G: ["StandardAnnotation", "StandardHCAnnotation"]
  GenomicsDBImport:
    genomicsdb-shared-posixfs-optimizations: true
    batch-size: 25
  GenotypeGVCFs:
    interval_length: 1000000
    max-alternate-alleles: 4
    seconds-between-progress-updates: 60
    extra: ["--only-output-calls-starting-in-intervals"]

clair3:
  model: /home/scruz/.conda/envs/clair3/bin/models/r1041_e82_400bps_sup_v500
